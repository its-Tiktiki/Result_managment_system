{% extends "base/base.html" %}
{% block title%} View Teachers {% endblock %}
{% block content %}

<div class="container">
    <table class="table">
        <thead>
            <tr>
                <th>Teachers Id </th>
                <th>Full Name</th>
                <th>Details</th>
            </tr>
        </thead>

        <tbody>
            {% for teacher in teachers_data %}
            <tr>
                <td>{{ teacher.teacher_id}}</td>
                <td>{{ teacher.first_name}} {{ teacher.last_name}}</td>
                <td><a href="{{ url_for('teacher_details.teacher_details',teacher_id=teacher.teacher_id)}}">View</a></td>
            </tr>
        </tbody>

        {% endfor %}

    </table>

</div>


{% endblock %}
