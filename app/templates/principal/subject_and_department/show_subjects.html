{% extends "base/base.html" %} {% block title %} All Subjects {% endblock %} {%
block content %}

<div class="container mt-4">
  <h2>All Subjects</h2>

  <table class="table table-bordered table-striped">
    <thead>
      <tr>
        <th>Subject Code</th>
        <th>Subject Name</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody>
      {% for subject in all_subject %}

      <tr>
        <td>{{ subject.subject_code}}</td>
        <td>{{ subject.subject_name}}</td>
        <td>
          <a
            href="{{ url_for('assign_subject_dashboard.edit_subject',subject_id=subject.subject_id )}}"
            ><button class="btn btn-primary btn-sm">Edit</button></a
          >
          <form
            action="{{ url_for('assign_subject_dashboard.delete_subject',
                         subject_id=subject.subject_id) }}"
            method="POST"
            style="display: inline"
          >
            <button
              type="submit"
              class="btn btn-danger btn-sm"
              onclick="
                return confirm('Are you sure you want to delete this subject?');
              "
            >
              Delete
            </button>
          </form>
        </td>
      </tr>

      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
