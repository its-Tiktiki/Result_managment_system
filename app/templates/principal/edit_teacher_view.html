{% extends "base/base.html" %}
{% block title%}Edit Teachers View {% endblock %}
{% block content %}

<div class="container">
    <table class="table">
        <thead>
            <tr>
                <th>Teachers Id </th>
                <th>Full Name</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody>
            {% for teacher in teachers_data %}
            <tr>
                <td>{{ teacher.teacher_id}}</td>
                <td>{{ teacher.first_name}} {{ teacher.last_name}}</td>
                <td><a href="#">Edit</a></td>
                <td><a href="#">Delete</a></td>
            </tr>
        </tbody>

        {% endfor %}

    </table>

</div>


{% endblock %}
