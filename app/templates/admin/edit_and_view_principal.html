{% extends "base/base.html" %}
{% block title %} View for Edit Principal {% endblock title%}
{% block content %}

<table class="table table-striped">
    <thaed>
        <tr>
            <th>Principal ID</th>
            <th>Name </th>
            <th>Action</th>
        </tr>
    </thaed>

    <tbody>
        {% for principal in principals %}

        <tr>
            <td>{{ principal.principal_id }}</td>
            <td>{{ principal.first_name }} {{ principal.last_name }}</td>
            <td><a class="btn btn-primary btn-sm" href="{{ url_for('admin_dashboard.edit_principal', principal_id=principal.principal_id) }}">Edit</a></td>
        <tr>
        {% endfor %}
    </tbody>

</table>

{% endblock %}
