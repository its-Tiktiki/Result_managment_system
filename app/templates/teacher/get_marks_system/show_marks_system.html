{% extends "base/base.html" %}
{% block title %} Marks topic System {% endblock %}
{% block content %}
<div class="container mt-4">
  <h2>All Marks System</h2>

  <table class="table table-bordered table-striped">
    <thead>
      <tr>
        <th>Marks System ID</th>
        <th>Marks System Name</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody>
      {% for mtn in marks_topic_name  %}

      <tr>
        <td>{{ mtn.marks_topic_id }}</td>
        <td>{{ mtn.marks_topic_name }}</td>
        <td>
          <a
            href="#"
          >
            <button class="btn btn-primary btn-sm">Edit</button></a
          >
          <form
            action="#"
            method="POST"
            style="display: inline"
          >
            <button
              type="submit"
              class="btn btn-danger btn-sm"
              onclick="
                return confirm('Are you sure you want to delete this subject?');
              "
            >
              Delete
            </button>
          </form>
        </td>
      </tr>

      {% endfor %}
    </tbody>
  </table>
</div>

{% endblock %}
